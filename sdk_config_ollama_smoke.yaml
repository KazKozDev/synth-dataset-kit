llm:
  provider: ollama
  api_base: http://localhost:11434/v1
  api_key: ollama
  model: qwen3:8b
  temperature: 0.2
  max_tokens: 2048
  top_p: 0.95
  timeout: 120
  max_retries: 3
  concurrent_requests: 4
generation:
  num_examples: 100
  strategy: auto
  domain: customer support
  language: en
  system_prompt: ''
  seed_file: ''
  personas:
  - beginner
  - expert
  - skeptic
  difficulty_levels:
  - easy
  - medium
  - hard
  batch_size: 2
  divergence_threshold: 0.15
  focus_top_k_clusters: 2
  rebalancing_strategy: strict
  semantic_focus_top_k: 3
  max_active_clusters_per_round: 12
  saturation_threshold: 1.05
  long_tail_boost: 0.35
  graph_neighbor_k: 3
  distance_allocator_weight: 0.6
quality:
  enabled: true
  min_score: 7.0
  judge_model: ''
  check_toxicity: true
  check_pii: true
  check_duplicates: true
  duplicate_threshold: 0.85
decontamination:
  enabled: true
  benchmarks:
  - mmlu
  - gsm8k
  - humaneval
  - arc
  - hellaswag
  similarity_threshold: 0.85
  method: hybrid
  use_benchmark_datasets: false
  load_full_benchmark_corpus: false
  benchmark_sample_limit: 200
  cache_dir: .sdk_cache/benchmarks
  embedding_model: all-MiniLM-L6-v2
  embedding_index_backend: json
  embedding_top_k: 3
  review_threshold: 0.92
  hard_fail_methods:
  - exact
  - ngram
  review_methods:
  - substring
  - embedding
export:
  format: jsonl
  output_dir: ./output
  include_metadata: false
  include_quality_report: true
